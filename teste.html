<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        CSS
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* NAVBAR */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    height: 60px;
    background: black;
    color: white;
}

/* CONTEÚDO */
.container {
    margin-top: 60px; /* espaço da navbar */
    display: flex;
    flex-wrap: wrap;
}

/* CARDS */
.card {
    flex: 1 1 300px;
    height: 200px;
    border: 1px solid #ccc;
}
    </style>
    <body>
    <nav>Navbar</nav>

    <main class="container">
        <div class="card">Texto</div>
        <div class="card">Imagem</div>
    </main>
</body>
</body>
</html>
